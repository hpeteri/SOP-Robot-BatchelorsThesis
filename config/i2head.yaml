  # left_eye_horizontal:
  #   channel: 0
  #   model: "PDI-1109MG"
  #   pulse_min: 500
  #   pulse_max: 2500
  #   angle_min: 0
  #   angle_max: 180
  #   home: 90
  #   reversed: false

  # InMoov: i01_head_eyeLeftUD
  # left_eye_vertical:
  #   channel: 1
  #   model: "PDI-1109MG"
  #   pulse_min: 500
  #   pulse_max: 2500
  #   angle_min: 0
