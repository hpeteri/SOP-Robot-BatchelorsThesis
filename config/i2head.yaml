# i2head.yaml - Moduulimäärittely InMoov i2Headille
#
# Tämä YAML-tiedosto on ainoa totuuden lähde i2Head-moduulin
# servoja koskevalle konfiguraatiolle. Samaa firmwarea ja ROS2-solmua
# voidaan käyttää eri moduuleilla vaihtamalla tämä tiedosto.
#
# Servotyypit:
# - PDI-1109MG (15 kpl): 2.5 kg·cm, 0.10 s/60°, 10 g, mikroservo
# - PDI-6221MG (2 kpl): 20 kg·cm, 0.16 s/60°, 62 g, vakiokoko
#
# InMoov i2Head -kanoniset nimet on merkitty # InMoov: -kommentteihin.
# Täytä kanavat oman johdotuksesi mukaan.
# Servot joita ei ole kytketty, voidaan jättää kommenttiin tai poistaa.

module:
  name: "InMoov i2Head"
  description: "i2Head facial expression module with PCA9685 servo driver"
  driver: "pca9685"
  i2c_address: "0x40"
  pwm_frequency: 50
  num_channels: 16

servos:

  # --- Silmät: 4× PDI-1109MG (mikroservot) ---
