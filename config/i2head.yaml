# i2head.yaml
# PCA9685 servo configuration for InMoov i2Head
# Maps joint names to PCA9685 channels and angle limits.
#
# Edit channel numbers to match your actual servo wiring.
# A single PCA9685 supports 16 channels (0-15).
# For >16 servos, add a second board with I2C address 0x41 (or 0x42, etc.)
# and extend addresses to channels 16-31, etc.
#
# Pulse range defaults: 500-2500 us (standard RC servo).
# Adjust MIN_PULSE/MAX_PULSE if servos have non-standard ranges.

# Head movement (replaces Dynamixel for i2Head)
# head_yaw_joint:
#   channel: 0
#   angle_min: 0
#   angle_max: 180
#   home: 90
#   min_pulse_us: 500
#   max_pulse_us: 2500
