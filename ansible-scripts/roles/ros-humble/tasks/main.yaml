---
- name: Ensure software-properties-common is installed
  become: true
  apt:
    name: software-properties-common
    state: present
    update_cache: true

- name: Add apt-fast PPA
  become: true
  apt_repository:
    repo: ppa:apt-fast/stable
    state: present

- name: Update apt cache
  become: true
  apt:
    update_cache: true

- name: Install apt-fast and basic tools
  become: true
  apt:
    name:
      - apt-fast
      - curl
      - python3-venv
      - python3-pip
    state: present

- name: Add ROS GPG key
  become: true
  ansible.builtin.apt_key:
    url: https://raw.githubusercontent.com/ros/rosdistro/master/ros.asc
    state: present

- name: Add ROS repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64] http://packages.ros.org/ros2/ubuntu {{ ansible_distribution_release }} main"
    state: present

- name: Update apt cache before installing ROS packages
  become: true
  apt:
    update_cache: true

- name: Install system packages with apt-fast
  become: true
  command:
    cmd: >
      apt-fast install -y build-essential cmake git libyaml-cpp-dev libbullet-dev
      python3-colcon-common-extensions python3-flake8 python3-setuptools python3-vcstool
      python3-virtualenv wget libasio-dev libtinyxml2-dev libcunit1-dev
      ros-humble-desktop ros-humble-dynamixel-sdk ros-humble-dynamixel-workbench
      ros-humble-test-msgs ros-humble-control-msgs ros-humble-realtime-tools
      ros-humble-xacro ros-humble-angles v4l-utils ros-humble-camera-calibration-parsers
      espeak python3-pyaudio

- name: Create Python virtualenv
  become: true
  command:
    cmd: python3 -m venv /home/{{ ansible_env.USER }}/SOP-Robot/.venv
    creates: "/home/{{ ansible_env.USER }}/SOP-Robot/.venv"

- name: Upgrade pip in virtualenv
  become: true
  pip:
    name: pip
    virtualenv: "/home/{{ ansible_env.USER }}/SOP-Robot/.venv"
    state: latest

- name: Install pip packages from requirements.txt
  become: true
  pip:
    requirements: "/home/{{ ansible_env.USER }}/SOP-Robot/requirements.txt"
    virtualenv: "/home/{{ ansible_env.USER }}/SOP-Robot/.venv"
    state: present
    extra_args: "--cache-dir /home/{{ ansible_env.USER }}/SOP-Robot/.venv/.pip_cache"

- name: Source ROS setup in .bashrc
  lineinfile:
    path: "/home/{{ ansible_env.USER }}/.bashrc"
    line: "source /opt/ros/humble/setup.bash"
    state: present

- name: Source ROS setup in noninteractive bash
  lineinfile:
    path: "/home/{{ ansible_env.USER }}/.bashrc_noninteractive"
    line: "source /opt/ros/humble/setup.bash"
    create: true
    state: present

- name: Download Dynamixel U2D2 rules
  become: true
  get_url:
    url: https://raw.githubusercontent.com/ROBOTIS-GIT/dynamixel-workbench/master/99-dynamixel-workbench-cdc.rules
    dest: /etc/udev/rules.d/

- name: Reload udev rules
  become: true
  command: udevadm control --reload-rules

- name: Trigger udev
  become: true
  command: udevadm trigger

- name: Initialize rosdep
  become: true
  command:
    cmd: rosdep init
    creates: /etc/ros/rosdep/sources.list.d/20-default.list

- name: Update rosdep
  become: true
  command: rosdep update
